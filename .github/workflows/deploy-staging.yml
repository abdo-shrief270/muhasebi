name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH
        env:
          HOST: ${{ secrets.STAGING_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Zero Downtime
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          PATH_APP: ${{ secrets.STAGING_APP_PATH }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key "$USER@$HOST" \
            "PATH_APP='$PATH_APP' REPO='$REPO' bash -s" << 'DEPLOY'
            set -e

            # Make sure the remote trusts github.com for the git clone below
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

            mkdir -p "$PATH_APP"
            cd "$PATH_APP"

            RELEASE=$(date +%Y%m%d%H%M%S)
            RELEASES_DIR="releases"
            SHARED_DIR="shared"

            mkdir -p "$RELEASES_DIR" "$SHARED_DIR"

            # First-time shared setup
            if [ ! -f "$SHARED_DIR/.env" ]; then
              echo "Missing shared .env — creating empty one"
              touch "$SHARED_DIR/.env"
            fi
            mkdir -p "$SHARED_DIR/storage"

            # Pull code
            git clone --depth=1 "git@github.com:${REPO}.git" "$RELEASES_DIR/$RELEASE"

            # Link shared resources
            ln -nfs "$PATH_APP/$SHARED_DIR/.env" "$RELEASES_DIR/$RELEASE/.env"
            rm -rf "$RELEASES_DIR/$RELEASE/storage"
            ln -nfs "$PATH_APP/$SHARED_DIR/storage" "$RELEASES_DIR/$RELEASE/storage"

            cd "$RELEASES_DIR/$RELEASE"
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            npm ci && npm run build

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            php artisan env:validate

            # Atomic symlink swap
            ln -nfs "$PATH_APP/$RELEASES_DIR/$RELEASE" "$PATH_APP/current"

            sudo systemctl reload php8.5-fpm || true
            php "$PATH_APP/current/artisan" queue:restart || true

            # Cleanup old releases (keep last 5)
            cd "$PATH_APP/$RELEASES_DIR"
            ls -dt */ | tail -n +6 | xargs -r rm -rf

            echo "Deployed release $RELEASE to staging"
          DEPLOY

      - name: Smoke Test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_URL }}/api/v1/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Staging health check passed"

      - name: Notify
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Staging deploy: ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
