name: Deploy Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts


      - name: Pre-deploy Backup
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          PATH_APP: ${{ secrets.PRODUCTION_APP_PATH }}
        run: |
          echo "HOST=$HOST"
          printf "HOST_RAW='%s'\n" "$HOST"
          ssh -i ~/.ssh/deploy_key $USER@$HOST "PATH_APP='$PATH_APP' bash -s" << 'BACKUP'
            set -e
      
            if [ ! -d "$PATH_APP/current" ]; then
              echo "⚠️ First deploy detected — skipping backup"
              exit 0
            fi
      
            cd "$PATH_APP/current"
            php artisan backup:database --filename=pre-deploy-$(date +%Y%m%d%H%M%S).sql
          BACKUP



      - name: Deploy with Zero Downtime
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          PATH_APP: ${{ secrets.PRODUCTION_APP_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST "PATH_APP='$PATH_APP' bash -s" << 'DEPLOY'
            set -e
      
            echo "🚀 Starting deploy..."
      
            mkdir -p "$PATH_APP"
            cd "$PATH_APP"
      
            RELEASE=$(date +%Y%m%d%H%M%S)
            RELEASES_DIR="releases"
            SHARED_DIR="shared"
      
            mkdir -p $RELEASES_DIR $SHARED_DIR
      
            # First-time shared setup
            if [ ! -f "$SHARED_DIR/.env" ]; then
              echo "⚠️ Missing shared .env — creating empty one"
              touch "$SHARED_DIR/.env"
            fi
      
            if [ ! -d "$SHARED_DIR/storage" ]; then
              mkdir -p "$SHARED_DIR/storage"
            fi
      
            # Create new release
            mkdir -p $RELEASES_DIR/$RELEASE
      
            echo "📦 Pulling code..."
            git clone --depth=1 git@github.com:${GITHUB_REPOSITORY}.git $RELEASES_DIR/$RELEASE
      
            # Link shared resources
            ln -nfs "$PATH_APP/$SHARED_DIR/.env" $RELEASES_DIR/$RELEASE/.env
            rm -rf $RELEASES_DIR/$RELEASE/storage
            ln -nfs "$PATH_APP/$SHARED_DIR/storage" $RELEASES_DIR/$RELEASE/storage
      
            cd $RELEASES_DIR/$RELEASE
      
            echo "📦 Installing dependencies..."
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
      
            npm ci
            npm run build
      
            echo "⚙️ Running Laravel optimizations..."
            
            # Atomic symlink swap
            ln -nfs "$PATH_APP/$RELEASES_DIR/$RELEASE" "$PATH_APP/current"
            
            # Restart queue BEFORE migration
            php "$PATH_APP/current/artisan" queue:restart || true
            
            # Run migrations safely AFTER switch
            php "$PATH_APP/current/artisan" migrate --force --no-interaction --step
            
            # Cache rebuild
            php "$PATH_APP/current/artisan" config:cache
            php "$PATH_APP/current/artisan" route:cache
            php "$PATH_APP/current/artisan" view:cache
      
            # Atomic switch
            echo "🔁 Switching release..."
            ln -nfs "$PATH_APP/$RELEASES_DIR/$RELEASE" "$PATH_APP/current"
      
            # Reload services
            sudo systemctl reload php8.5-fpm || true
            php "$PATH_APP/current/artisan" queue:restart || true
      
            # Cleanup old releases
            cd $RELEASES_DIR
            ls -dt */ | tail -n +6 | xargs rm -rf || true
      
            echo "✅ Deploy complete: $RELEASE"
          DEPLOY


      - name: Health Check
        id: health
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.PRODUCTION_URL }}/api/v1/health)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i failed ($STATUS), retrying..."
            sleep 3
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Rollback on Failure
        if: failure() && steps.health.outcome == 'failure'
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          PATH_APP: ${{ secrets.PRODUCTION_APP_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST bash -s << 'ROLLBACK'
            set -e
            cd $PATH_APP
            PREVIOUS=$(ls -dt releases/*/ | sed -n '2p' | tr -d '/')
            if [ -n "$PREVIOUS" ]; then
              ln -nfs $PWD/releases/$PREVIOUS current
              sudo systemctl reload php8.5-fpm
              php current/artisan queue:restart
              echo "Rolled back to $PREVIOUS"
            else
              echo "No previous release to rollback to!"
              exit 1
            fi
          ROLLBACK

      - name: Notify
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Production deploy: ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
