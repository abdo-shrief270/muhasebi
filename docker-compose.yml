services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=production
    networks:
      - muhasebi

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - muhasebi

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --memory=256
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - muhasebi
    stop_signal: SIGTERM
    stop_grace_period: 30s

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - muhasebi

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-muhasebi}
      POSTGRES_USER: ${DB_USERNAME:-muhasebi}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: pg_isready -U ${DB_USERNAME:-muhasebi}
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - muhasebi

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - muhasebi

volumes:
  app-storage:
  postgres-data:
  redis-data:

networks:
  muhasebi:
    driver: bridge
